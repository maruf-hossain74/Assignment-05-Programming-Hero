<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issue Tracker</title>

    <!-- Login Protection -->
    <script>
        if (localStorage.getItem("loggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Open Sans", sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100 p-2">

    <!--  NAVBAR  -->
    <section class="bg-white shadow p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold">All Issues</h1>
        </div>

        <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Search issues..." class="border px-3 py-2 rounded-md">
            <button id="searchBtn" class="bg-blue-500 text-white px-4 py-2 rounded-md">
                Search
            </button>
        </div>
    </section>


    <!--  STATUS BUTTON / TABS -->
    <section class="p-4 bg-white mt-2">

    <div class="flex gap-4 border-b pb-3">

        <button id="tabAll" class="tab-btn flex-1 font-semibold text-white bg-purple-600 py-2 rounded-t-md">
            All
        </button>

        <button id="tabOpen" class="tab-btn flex-1 font-semibold text-gray-700 bg-gray-100 py-2 rounded-t-md">
            Open
        </button>

        <button id="tabClosed" class="tab-btn flex-1 font-semibold text-gray-700 bg-gray-100 py-2 rounded-t-md">
            Closed
        </button>

    </div>

</section>


    <!--  SHOW DISPLAY  -->
    <section class="p-4 bg-white mt-2 flex justify-between items-center">

        <div class="flex items-center gap-3">
            <span class="text-xl bg-purple-400 text-purple-900 rounded "><i class="fa-solid fa-grip"></i></span>
            <h2 class="text-lg font-semibold">
                <span id="issueCount">0</span> Issues
            </h2>
        </div>

        <div class="flex gap-4">
            <span class="text-green-600 font-semibold">
                ● Open
            </span>

            <span class="text-purple-600 font-semibold">
                ● Closed
            </span>
        </div>

    </section>


    <!--  LOADING SPINNER  -->
    <div id="loadingSpinner" class="hidden flex justify-center p-10">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
    </div>


    <!--  CARDS  -->
    <section id="issuesContainer" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

        <!-- JS will inject cards here -->

    </section>


    <!-- ISSUE MODAL -->
    
    <div id="issueModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 relative">

        <!-- Status / Title / Date -->
        <div class="mb-4 flex flex-col gap-2">
            <h2 id="modalTitle" class="text-2xl font-bold text-gray-800"></h2>
           <div class = "flex">
                <div id="modalStatus" class="inline-block"></div>
                <p class="text-gray-500 text-sm flex items-center gap-1">
                    <i class="fa-solid fa-circle text-[6px]"></i> 
                    Opened by <span id="modalAssignee" class="font-semibold text-gray-800"></span> 
                    <i class="fa-solid fa-circle text-[6px]"></i> 
                    <span id="modalCreated"></span>
                </p>
                <div id="modalCreated" class="text-gray-500 text-sm"></div>
           </div>
        </div>

        <!-- Labels -->
        <div id="modalLabel" class="flex gap-2 mb-4"></div>

        <!-- Full Description -->
        <p id="modalDescription" class="text-gray-600 mb-6"></p>

        <!-- Assignee + Priority -->
        <div class="bg-gray-100 p-4 rounded flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">Assignee:</p>
                <p id="modalAuthor" class="font-semibold text-gray-800"></p>
            </div>
            <div>
                <p class="text-gray-500 text-sm">Priority:</p>
                <div id="modalPriority"></div>
            </div>
        </div>
        <div class = "pt-3 flex justify-end">
            <button id="closeModal1" class = "bg-purple-800 text-white rounded p-2">close</button>
        </div>

        <!-- Close button -->
        <button id="closeModal2" class="absolute top-3 right-3 text-black px-3 py-1 rounded">
           <i class="fa-solid fa-x"></i>
        </button>
    </div>
</div>
           
    <script src="script.js"></script>
</body>

</html>
