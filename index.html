<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issue Tracker</title>

    <!-- Login Protection -->
    <script>
        if (localStorage.getItem("loggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Open Sans", sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100 p-2">

    <!--  NAVBAR  -->
    <section class="bg-white shadow p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold">All Issues</h1>
        </div>

        <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Search issues..." class="border px-3 py-2 rounded-md">
            <button id="searchBtn" class="bg-blue-500 text-white px-4 py-2 rounded-md">
                Search
            </button>
        </div>
    </section>


    <!--  STATUS BUTTON / TABS -->
    <section class="p-4 bg-white mt-2">

    <div class="flex gap-4 border-b pb-3">

        <button id="tabAll" class="tab-btn flex-1 font-semibold text-white bg-purple-600 py-2 rounded-t-md">
            All
        </button>

        <button id="tabOpen" class="tab-btn flex-1 font-semibold text-gray-700 bg-gray-100 py-2 rounded-t-md">
            Open
        </button>

        <button id="tabClosed" class="tab-btn flex-1 font-semibold text-gray-700 bg-gray-100 py-2 rounded-t-md">
            Closed
        </button>

    </div>

</section>


    <!--  SHOW DISPLAY  -->
    <section class="p-4 bg-white mt-2 flex justify-between items-center">

        <div class="flex items-center gap-3">
            <span class="text-xl bg-purple-400 text-purple-900 rounded "><i class="fa-solid fa-grip"></i></span>
            <h2 class="text-lg font-semibold">
                <span id="issueCount">0</span> Issues
            </h2>
        </div>

        <div class="flex gap-4">
            <span class="text-green-600 font-semibold">
                ● Open
            </span>

            <span class="text-purple-600 font-semibold">
                ● Closed
            </span>
        </div>

    </section>


    <!--  LOADING SPINNER  -->
    <div id="loadingSpinner" class="hidden flex justify-center p-10">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
    </div>


    <!--  CARDS  -->
    <section id="issuesContainer" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

        <!-- JS will inject cards here -->

    </section>


    <!-- ISSUE MODAL -->
    <div id="issueModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

        <div class="bg-white rounded-xl shadow-xl w-[600px] overflow-hidden relative">

            <!-- top colored border -->
            <div id="modalBorder" class="h-2 bg-green-500"></div>

            <div class="p-6">

                <!-- header -->
                <div class="flex justify-between items-center mb-4">

                    <div class="flex items-center gap-3">
                        <div class="bg-green-100 p-3 rounded-full text-green-600">
                            <i class="fa-regular fa-circle-dot"></i>
                        </div>
                    </div>

                    <!-- priority -->
                    <span id="modalPriority" class="bg-red-100 text-red-500 px-5 py-2 rounded-full font-semibold">
                        HIGH
                    </span>

                </div>

                <!-- title -->
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-3">
                </h2>

                <!-- description -->
                <p id="modalDescription" class="text-gray-500 mb-6">
                </p>

                <!-- labels -->
                <div class="flex gap-3 mb-6">

                    <span id="modalLabel" class="border border-red-300 text-red-500 px-4 py-1 rounded-full text-sm">
                        BUG
                    </span>

                    <span class="border border-yellow-400 text-yellow-600 px-4 py-1 rounded-full text-sm">
                        HELP WANTED
                    </span>

                </div>

            </div>

            <!-- footer -->
            <div class="bg-gray-100 px-6 py-4 flex justify-between text-gray-500">

                <div>
                    <span id="modalIssueId"></span> by
                    <span id="modalAuthor"></span>
                </div>

                <div id="modalCreated"></div>

            </div>

            <!-- close button -->
            <button id="closeModal" class="absolute top-3 right-4 text-gray-500 text-xl">
                ✖
            </button>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
